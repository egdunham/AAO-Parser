<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AAO Guide Converter</title>
        <link rel="stylesheet" href="/src/styles.css" />
        <script src="/node_modules/papaparse/papaparse.js"></script>
    </head>

    <body>
        <div class="row">
            <!-- Left-hand nav menu. Snap to single column on screen resize -->
             <div class="col-6 col-s-12">
                <div>
                    <img src="/src/images/aao2.jpg" alt="Arizona Archives Online Logo"/>
                </div>
                <div class="left-menu">
                    <ul>
                        <li>I'M A TEST</li>
                        <li>ME TOO</li>
                    </ul>
                </div>
             </div>
             
             
              <div class="col-3 col-s-3" id="content">

                <!-- Drag-and-drop upload box for CSV container list -->
                <div>
                    <form class="upload-wrapper">
                    <h2>Upload Files</h2>
                    <p>Click or drop & drop below to upload the files</p>
                    <div class="upload-zone">
                        <div class="icon bi bi-cloud-upload"></div>
                        <p class="file-name">No File Uploaded</p>
                        <p class="file-size">0.00 KB</p>
                        <input type="file" id="input-file" name="file" accept="image/*">
                    </div>
                    <div class="action-btns">
                        <button type="reset" id="reset-btn">Cancel</button>
                        <button type="submit" id="convert-btn">Convert</button>
                    </div>
                </form>
                </div>
                
            </div>
        </div>

        <!-- Script governing upload behavior and calling conversion functionalities -->
        <script src="/src/js/upload.js" type="module"></script>
        

    </body>

</html>
